server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: encaminha todas as rotas para o index.html (React Router cuida do resto)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets estáticos com cache longo (Vite gera nomes com hash, logo são imutáveis)
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html nunca deve ser cacheado (garante que o usuário receba o bundle mais novo)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Compressão gzip para assets de texto
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
}
